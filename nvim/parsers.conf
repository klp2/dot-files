# nvim tree-sitter parser source-of-truth.
# Format: lang|url|branch|location
#   branch: empty = default (origin/HEAD); otherwise named branch or tag
#   location: empty = src/ at repo root; otherwise a subdir containing src/
#
# Update SHAs in parsers.lock with: ./install/nvim-parsers.sh --update
